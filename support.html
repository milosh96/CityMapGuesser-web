<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/appicon.png">
    <title>Support</title>
    <meta property="og:image" content="https://citymapguesser.app/assets/appicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            line-height: 1.6;
        }

/* links inside page content */
        .content a {
            color: white;
            text-decoration: none;
            margin: 0 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid white;
        }

        /* ensure footer links use their own style (added by footer.js) */
        #site-footer a {
            margin: 0;
            border-bottom: none;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        .content {
            text-align: justify;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <h1>Support</h1>
            <p>If you need help, please contact us at:</p>
            Email: <a href="mailto:miloscubrilo96@gmail.com">miloscubrilo96@gmail.com</a>
            <br><br><br>
        </div>
    </div>
    <div id="site-footer"></div>
    <script src="/assets/footer.js"></script>
</body>

</html>
